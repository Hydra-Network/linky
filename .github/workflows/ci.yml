name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  dockerci:
    name: Docker CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . --file Dockerfile --tag ghcr.io/hydra-network/linky:${{ env.IMAGE_TAG }}
          docker tag ghcr.io/hydra-network/linky:${{ env.IMAGE_TAG }} ghcr.io/hydra-network/linky:latest

      - name: Push Docker containers
        run: |
          docker push ghcr.io/hydra-network/linky:${{ env.IMAGE_TAG }}
          docker push ghcr.io/hydra-network/linky:latest
